<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Hojozat</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .app-layout { display: flex; min-height: 100vh; background: var(--color-bg); }
        /* Sidebar */
        .sidebar {
            width: 16rem; flex-shrink: 0; display: flex; flex-direction: column;
            background: var(--color-card); border-right: 1px solid var(--color-border);
            position: fixed; top: 0; bottom: 0; left: 0; z-index: 50;
            transform: translateX(-100%); transition: transform 0.3s ease;
        }
        .sidebar.open   { transform: translateX(0); }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--color-border); }
        .logo-link      { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; margin-bottom: 1.5rem; }
        .logo-box       {
            width: 2.25rem; height: 2.25rem;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border-radius: 0.75rem; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: 900;
        }
        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar {
            width: 2.5rem; height: 2.5rem; border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem;
        }
        .user-name  { font-weight: 700; font-size: 0.875rem; color: var(--color-text); }
        .user-email { font-size: 0.75rem; color: var(--color-text-muted); }
        .sidebar-nav    { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
        .sidebar-footer { padding: 1rem; border-top: 1px solid var(--color-border); display: flex; flex-direction: column; gap: 0.25rem; }
        /* Main */
        .main-content   { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .topbar {
            position: sticky; top: 0; z-index: 30;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--color-border);
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .menu-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--color-text); padding: 0.25rem; display: none; }
        .page-content { padding: 1.5rem; flex: 1; }
        /* Stats cards */
        .stat-card {
            border-radius: 1rem; padding: 1.5rem; color: white; transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; }
        /* Quick actions */
        .actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        @media (min-width: 640px) { .actions-grid { grid-template-columns: repeat(4, 1fr); } }
        .action-card { padding: 1rem; text-align: center; cursor: pointer; text-decoration: none; display: block; }
        /* Active queue card */
        .queue-progress { height: 4px; background: #3b82f6; border-radius: 2px 2px 0 0; transition: width 1s ease; }
        .queue-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin: 0.75rem 0; }
        .queue-stat-item { text-align: center; padding: 0.5rem; border-radius: 0.75rem; background: var(--color-bg); }
        /* Notification item */
        .notif-item { border-left: 3px solid transparent; }
        .notif-item.unread { border-left-color: #3b82f6; }
        /* Profile */
        .profile-avatar {
            width: 5rem; height: 5rem; border-radius: 1rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 2rem;
        }
        /* Overlay */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 40;
        }
        .sidebar-overlay.visible { display: block; }
        /* Tab pane */
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease; }
        /* Responsive */
        @media (min-width: 1024px) {
            .sidebar { position: static; transform: none; }
            .sidebar-overlay { display: none !important; }
            .menu-btn { display: none !important; }
        }
        @media (max-width: 1023px) { .menu-btn { display: block; } }
    </style>
</head>
<body>
<div id="toast-container"></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-link">
                <div class="logo-box">H</div>
                <span class="font-black gradient-text">Hojozat</span>
            </a>
            <div class="user-info">
                <div class="user-avatar" id="user-avatar-char">U</div>
                <div>
                    <div class="user-name"  id="sidebar-user-name">Loading...</div>
                    <div class="user-email" id="sidebar-user-email"></div>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
            <button class="sidebar-item active" data-tab="overview"    id="nav-overview">     <span>📊</span><span>Overview</span></button>
            <button class="sidebar-item"        data-tab="active"      id="nav-active">       <span>🎫</span><span>Active Queues</span></button>
            <button class="sidebar-item"        data-tab="history"     id="nav-history">      <span>📋</span><span>History</span></button>
            <button class="sidebar-item"        data-tab="notifications" id="nav-notifications"><span>🔔</span><span>Notifications</span><span id="notif-badge" class="badge" style="margin-left:auto;background:#ef4444;color:white;display:none;"></span></button>
            <button class="sidebar-item"        data-tab="profile"     id="nav-profile">      <span>👤</span><span>Profile</span></button>
        </nav>

        <div class="sidebar-footer">
            <a href="map.html" class="sidebar-item"><span>🗺️</span><span>Back to Map</span></a>
            <button class="sidebar-item" data-toggle-theme><span data-theme-icon>🌙</span><span id="theme-label">Dark Mode</span></button>
            <button class="sidebar-item" id="logout-btn" style="color:#ef4444;"><span>🚪</span><span>Logout</span></button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <!-- Topbar -->
        <div class="topbar glass">
            <div class="topbar-left">
                <button class="menu-btn" id="menu-btn">☰</button>
                <h1 style="font-size:1.2rem; font-weight:900; color:var(--color-text);" id="page-title">📊 Overview</h1>
            </div>
            <div id="active-badge"></div>
        </div>

        <!-- Content -->
        <div class="page-content">
            <!-- Overview Tab -->
            <div class="tab-pane active" id="tab-overview">
                <div class="stat-card-grid" id="stats-cards">
                    <div class="stat-card" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);">
                        <div style="font-size:1.75rem; margin-bottom:0.25rem;">🎫</div>
                        <div style="font-size:1.75rem; font-weight:900;" id="stat-joined">0</div>
                        <div style="color:rgba(255,255,255,0.8); font-size:0.875rem;">Total Joined</div>
                    </div>
                    <div class="stat-card" style="background:linear-gradient(135deg,#22c55e,#15803d);">
                        <div style="font-size:1.75rem; margin-bottom:0.25rem;">✅</div>
                        <div style="font-size:1.75rem; font-weight:900;" id="stat-served">0</div>
                        <div style="color:rgba(255,255,255,0.8); font-size:0.875rem;">Total Served</div>
                    </div>
                    <div class="stat-card" style="background:linear-gradient(135deg,#f87171,#b91c1c);">
                        <div style="font-size:1.75rem; margin-bottom:0.25rem;">❌</div>
                        <div style="font-size:1.75rem; font-weight:900;" id="stat-cancelled">0</div>
                        <div style="color:rgba(255,255,255,0.8); font-size:0.875rem;">Cancelled</div>
                    </div>
                </div>

                <div style="margin-top:1.5rem;">
                    <h2 style="font-size:1.1rem; font-weight:700; color:var(--color-text); margin-bottom:1rem;">🎫 Active Queues</h2>
                    <div id="overview-queues"></div>
                </div>

                <div style="margin-top:1.5rem;">
                    <h2 style="font-size:1.1rem; font-weight:700; color:var(--color-text); margin-bottom:1rem;">⚡ Quick Actions</h2>
                    <div class="actions-grid">
                        <a href="map.html" class="card action-card card-hover">
                            <div style="font-size:1.75rem; margin-bottom:0.5rem;">🗺️</div>
                            <div style="font-size:0.875rem; font-weight:600; color:var(--color-text);">Find Institutions</div>
                        </a>
                        <button class="card action-card card-hover" data-action-tab="history">
                            <div style="font-size:1.75rem; margin-bottom:0.5rem;">📋</div>
                            <div style="font-size:0.875rem; font-weight:600; color:var(--color-text);">View History</div>
                        </button>
                        <button class="card action-card card-hover" data-action-tab="notifications">
                            <div style="font-size:1.75rem; margin-bottom:0.5rem;">🔔</div>
                            <div style="font-size:0.875rem; font-weight:600; color:var(--color-text);">Notifications</div>
                        </button>
                        <button class="card action-card card-hover" data-action-tab="profile">
                            <div style="font-size:1.75rem; margin-bottom:0.5rem;">👤</div>
                            <div style="font-size:0.875rem; font-weight:600; color:var(--color-text);">Edit Profile</div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Active Tab -->
            <div class="tab-pane" id="tab-active">
                <div id="active-queues-list"></div>
            </div>

            <!-- History Tab -->
            <div class="tab-pane" id="tab-history">
                <div id="history-list"></div>
            </div>

            <!-- Notifications Tab -->
            <div class="tab-pane" id="tab-notifications">
                <div id="mark-read-row" style="display:none; text-align:right; margin-bottom:0.75rem;">
                    <button class="btn btn-secondary" style="font-size:0.875rem; padding:0.375rem 0.875rem;"
                        id="mark-all-read-btn">✓ Mark all read</button>
                </div>
                <div id="notifications-list"></div>
            </div>

            <!-- Profile Tab -->
            <div class="tab-pane" id="tab-profile">
                <div style="max-width:32rem;" class="fade-in">
                    <div class="card p-6">
                        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem;">
                            <div class="profile-avatar" id="profile-avatar-char">U</div>
                            <div>
                                <h2 style="font-size:1.25rem; font-weight:900; color:var(--color-text);" id="profile-display-name"></h2>
                                <p style="color:var(--color-text-muted);" id="profile-display-email"></p>
                                <span class="badge status-open" id="profile-role-badge" style="margin-top:0.25rem;"></span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label style="display:block; font-size:0.875rem; font-weight:600; color:var(--color-text); margin-bottom:0.375rem;">Name</label>
                                <input type="text" id="profile-name" class="input" />
                            </div>
                            <div>
                                <label style="display:block; font-size:0.875rem; font-weight:600; color:var(--color-text); margin-bottom:0.375rem;">Phone</label>
                                <input type="tel" id="profile-phone" class="input" />
                            </div>
                            <button class="btn btn-primary w-full" id="profile-save-btn">
                                💾 Save Changes
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/app.js"></script>
<script>
// ── Auth guard ──
const user = Auth.requireAuth('user');
if (!user) throw new Error('redirect'); // requireAuth already redirected

// ── State ──
let activeQueues   = [];
let notifications  = [];
let unreadCount    = 0;
let historyLoaded  = false;

// ── Sidebar user info ──
document.getElementById('user-avatar-char').textContent   = (user.name || 'U')[0].toUpperCase();
document.getElementById('sidebar-user-name').textContent  = user.name;
document.getElementById('sidebar-user-email').textContent = user.email;
document.getElementById('profile-avatar-char').textContent = (user.name||'U')[0].toUpperCase();
document.getElementById('profile-display-name').textContent  = user.name;
document.getElementById('profile-display-email').textContent = user.email;
document.getElementById('profile-role-badge').textContent    = user.role;
document.getElementById('profile-name').value     = user.name   || '';
document.getElementById('profile-phone').value    = user.phone  || '';

// ── Tab switching ──
const TABS = { overview:'📊 Overview', active:'🎫 Active Queues', history:'📋 History', notifications:'🔔 Notifications', profile:'👤 Profile' };

function switchTab(id) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-item[data-tab]').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    document.getElementById('nav-' + id)?.classList.add('active');
    document.getElementById('page-title').textContent = TABS[id] || id;
    if (id === 'history' && !historyLoaded) { historyLoaded = true; loadHistory(); }
    closeSidebar();
}

document.querySelectorAll('.sidebar-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── Mobile sidebar ──
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('visible'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('visible'); }
document.getElementById('menu-btn').addEventListener('click', openSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

// ── Theme label ──
function updateThemeLabel() {
    document.getElementById('theme-label').textContent = Theme.isDark() ? 'Light Mode' : 'Dark Mode';
}
updateThemeLabel();
document.addEventListener('click', e => { if (e.target.closest('[data-toggle-theme]')) setTimeout(updateThemeLabel, 50); });

// ── Logout ──
document.getElementById('logout-btn').addEventListener('click', () => Auth.logout());

// ── Load dashboard data ──
async function loadDashboard() {
    try {
        const [statsRes, queuesRes, notifRes] = await Promise.all([
            API.get('/users/dashboard'),
            API.get('/users/queues/active'),
            API.get('/notifications', { params: { limit: 10 } }),
        ]);
        const stats = statsRes.stats || {};
        document.getElementById('stat-joined').textContent    = stats.totalJoined    || 0;
        document.getElementById('stat-served').textContent    = stats.totalServed    || 0;
        document.getElementById('stat-cancelled').textContent = stats.totalCancelled || 0;
        activeQueues = queuesRes.activeQueues || [];
        notifications  = notifRes.notifications || [];
        unreadCount    = notifRes.unreadCount   || 0;
    } catch {
        document.getElementById('stat-joined').textContent    = 12;
        document.getElementById('stat-served').textContent    = 9;
        document.getElementById('stat-cancelled').textContent = 3;
        activeQueues = [];
        notifications  = [];
    }
    renderActiveQueues();
    renderNotifications();
    updateBadges();
}

function updateBadges() {
    const badge = document.getElementById('notif-badge');
    if (unreadCount > 0) { badge.textContent = unreadCount; badge.style.display = ''; }
    else badge.style.display = 'none';
    const activeBadge = document.getElementById('active-badge');
    if (activeQueues.length > 0) {
        activeBadge.innerHTML = `<span class="badge" style="background:#dcfce7;color:#15803d;">🎫 ${activeQueues.length} Active</span>`;
    } else activeBadge.innerHTML = '';
}

// ── Active Queues ──
function renderActiveQueues() {
    const ovContainer  = document.getElementById('overview-queues');
    const actContainer = document.getElementById('active-queues-list');

    if (activeQueues.length === 0) {
        const empty = `<div class="card" style="padding:2rem;text-align:center;">
            <div style="font-size:2.5rem;margin-bottom:0.75rem;">😊</div>
            <p style="font-weight:600;color:var(--color-text);">No active queues</p>
            <p style="font-size:0.875rem;color:var(--color-text-muted);margin-top:0.25rem;">Visit the map to join a queue</p>
            <a href="map.html" class="btn btn-primary" style="margin-top:1rem;display:inline-flex;">🗺️ Go to Map</a>
        </div>`;
        ovContainer.innerHTML = empty;
        actContainer.innerHTML = `<div class="card" style="padding:3rem;text-align:center;">
            <div style="font-size:3rem;margin-bottom:1rem;">🎫</div>
            <p style="font-weight:700;font-size:1.1rem;color:var(--color-text);">No active queues</p>
            <a href="map.html" class="btn btn-primary" style="margin-top:1rem;">Find Institutions →</a>
        </div>`;
        return;
    }

    const html = activeQueues.map(q => queueCardHTML(q)).join('');
    ovContainer.innerHTML  = html;
    actContainer.innerHTML = html;
    ovContainer.querySelectorAll('[data-leave]').forEach(btn => btn.addEventListener('click', () => leaveQueue(btn.dataset.leave)));
    actContainer.querySelectorAll('[data-leave]').forEach(btn => btn.addEventListener('click', () => leaveQueue(btn.dataset.leave)));
}

function queueCardHTML(q) {
    const progress = Math.max(0, Math.min(100, 100 - (q.position / 20) * 100));
    const statusLabel = q.status === 'in_service' ? '🩺 You are in service!' : `Position #${q.position}`;
    const inSvcHTML = q.inService
        ? `<div style="font-size:.75rem;color:var(--color-text-muted);margin-top:.25rem;">🩺 Now serving: <strong>${q.inService.displayName}</strong> (Ticket #${q.inService.ticketNumber})</div>`
        : '';
    return `<div class="card" style="overflow:hidden; margin-bottom:0.75rem;">
        <div class="queue-progress" style="width:${progress}%;"></div>
        <div style="padding:1rem;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem;">
                <div>
                    <h3 style="font-weight:700;color:var(--color-text);">${q.institutionName}</h3>
                    <p style="font-size:0.875rem;color:var(--color-text-muted);text-transform:capitalize;">${q.institutionCategory||''}</p>
                    ${inSvcHTML}
                </div>
                <div style="text-align:right;">
                    <div style="font-size:1.75rem;font-weight:900;" class="gradient-text">#${q.position}</div>
                    <div style="font-size:0.75rem;color:var(--color-text-muted);">your position</div>
                </div>
            </div>
            <div class="queue-stats">
                <div class="queue-stat-item"><div>🎫</div><div style="font-weight:700;font-size:0.875rem;color:var(--color-text);">#${q.ticketNumber}</div><div style="font-size:0.7rem;color:var(--color-text-muted);">Ticket</div></div>
                <div class="queue-stat-item"><div>⏱️</div><div style="font-weight:700;font-size:0.875rem;color:var(--color-text);">${q.estimatedWait}m</div><div style="font-size:0.7rem;color:var(--color-text-muted);">Est. Wait</div></div>
                <div class="queue-stat-item"><div>📊</div><div style="font-weight:700;font-size:0.875rem;color:var(--color-text);">${q.status === 'in_service' ? 'In Service' : 'Waiting'}</div><div style="font-size:0.7rem;color:var(--color-text-muted);">Status</div></div>
            </div>
            ${q.status === 'waiting' ? `<button class="btn btn-danger w-full" style="font-size:0.875rem;padding:0.5rem;" data-leave="${q.institutionId}">
                🚪 Leave Queue
            </button>` : `<div style="text-align:center;font-weight:700;color:#22c55e;padding:.5rem">🩺 You are being served!</div>`}
        </div>
    </div>`;
}

async function leaveQueue(institutionId) {
    try {
        await API.delete(`/queues/${institutionId}/leave`);
        Toast.success('Left queue successfully');
        activeQueues = activeQueues.filter(q => q.institutionId !== institutionId);
        renderActiveQueues();
        updateBadges();
    } catch (err) {
        Toast.error(err?.response?.data?.error || 'Failed to leave queue');
    }
}

// ── History ──
async function loadHistory() {
    const container = document.getElementById('history-list');
    container.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="animate-bounce" style="font-size:2rem;">⏳</div></div>`;
    try {
        const res = await API.get('/users/queues/history');
        const history = res.history || [];
        if (history.length === 0) {
            container.innerHTML = `<div class="card" style="padding:3rem;text-align:center;"><div style="font-size:3rem;margin-bottom:1rem;">📋</div><p style="color:var(--color-text-muted);">No queue history yet</p></div>`;
            return;
        }
        container.innerHTML = history.map(item => `
            <div class="card" style="padding:1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <div style="width:2.5rem;height:2.5rem;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:rgba(59,130,246,0.1);">
                        ${item.status === 'served' ? '✅' : '❌'}
                    </div>
                    <div>
                        <div style="font-weight:600;color:var(--color-text);">${item.institutionName}</div>
                        <div style="font-size:0.75rem;color:var(--color-text-muted);">Ticket #${item.ticketNumber} • ${new Date(item.joinedAt).toLocaleDateString()}</div>
                    </div>
                </div>
                <span class="badge ${item.status === 'completed' ? 'status-open' : 'status-closed'}">${item.status}</span>
            </div>
        `).join('');
    } catch {
        container.innerHTML = `<div class="card" style="padding:3rem;text-align:center;"><p style="color:var(--color-text-muted);">Could not load history</p></div>`;
    }
}

// ── Notifications ──
function renderNotifications() {
    const container = document.getElementById('notifications-list');
    const readRow   = document.getElementById('mark-read-row');
    readRow.style.display = unreadCount > 0 ? '' : 'none';

    if (notifications.length === 0) {
        container.innerHTML = `<div class="card" style="padding:3rem;text-align:center;"><div style="font-size:3rem;margin-bottom:1rem;">🔔</div><p style="color:var(--color-text-muted);">No notifications</p></div>`;
        return;
    }
    const icons = { your_turn: '🎉', turn_near: '⏳' };
    container.innerHTML = notifications.map(n => `
        <div class="card notif-item ${!n.isRead ? 'unread' : ''}" style="padding:1rem;margin-bottom:0.75rem;">
            <div style="display:flex;align-items:flex-start;gap:0.75rem;">
                <div style="font-size:1.5rem;">${icons[n.type] || '🔔'}</div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
                        <div style="font-weight:600;font-size:0.875rem;color:var(--color-text);">${n.title||''}</div>
                        ${!n.isRead ? '<span style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0;display:inline-block;"></span>' : ''}
                    </div>
                    <p style="font-size:0.875rem;color:var(--color-text-muted);margin-top:0.25rem;">${n.message||''}</p>
                    <p style="font-size:0.75rem;color:var(--color-text-muted);margin-top:0.25rem;">${new Date(n.createdAt).toLocaleString()}</p>
                </div>
            </div>
        </div>
    `).join('');
}

async function markAllRead() {
    try {
        await API.patch('/notifications/read-all');
        unreadCount = 0;
        notifications = notifications.map(n => ({ ...n, isRead: true }));
        renderNotifications();
        updateBadges();
    } catch {}
}

// ── Profile ──
async function saveProfile() {
    const btn = document.getElementById('profile-save-btn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
        const res = await API.put('/users/profile', {
            name:  document.getElementById('profile-name').value,
            phone: document.getElementById('profile-phone').value,
        });
        const updated = Auth.updateUser(res.user || {});
        document.getElementById('profile-display-name').textContent = updated.name;
        document.getElementById('sidebar-user-name').textContent    = updated.name;
        Toast.success('Profile updated!');
    } catch {
        Toast.error('Failed to update profile');
    } finally {
        btn.disabled = false; btn.textContent = '💾 Save Changes';
    }
}

// ── Socket real-time ──
Socket.on('positionUpdated', ({ institutionId, position, estimatedWait, status, inService }) => {
    activeQueues = activeQueues.map(q =>
        q.institutionId === institutionId ? { ...q, position, estimatedWait, status, inService } : q
    );
    renderActiveQueues();
});
Socket.on('yourTurn', ({ institutionName }) => {
    Toast.success(`🎉 It's your turn at ${institutionName}!`, 10000);
    loadDashboard();
});
Socket.on('removedFromQueue', ({ institutionName }) => {
    Toast.info(`You were removed from the queue at ${institutionName}`);
    loadDashboard();
});

// ── Init ──
// Bind quick action tab buttons
document.querySelectorAll('[data-action-tab]').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.actionTab));
});

// Bind mark all read button
document.getElementById('mark-all-read-btn')?.addEventListener('click', markAllRead);

// Bind profile save button
document.getElementById('profile-save-btn')?.addEventListener('click', saveProfile);

loadDashboard();
</script>
</body>
</html>
