<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login – Hojozat</title>
<link rel="stylesheet" href="css/admin.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%)}
.login-card{width:100%;max-width:24rem;padding:2.5rem;background:var(--card);border:1px solid var(--border);border-radius:1rem;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:2rem}
.login-logo .logo-box{width:3rem;height:3rem;font-size:1.4rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.4rem;color:var(--muted)}
.error-msg{color:var(--danger);font-size:.8rem;margin-bottom:.75rem;display:none}
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-box" style="width:3rem;height:3rem;background:linear-gradient(135deg,#3b82f6,#7c3aed);border-radius:.75rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:1.4rem">H</div>
    <div>
      <div style="font-weight:900;font-size:1.25rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Hojozat</div>
      <div style="font-size:.75rem;color:var(--muted)">Admin Panel</div>
    </div>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" class="input" placeholder="admin@hojozat.com" autofocus/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" class="input" placeholder="••••••••"/>
  </div>
  <div id="error" class="error-msg"></div>
  <button class="btn btn-primary" style="width:100%;padding:.75rem;font-size:.9rem" onclick="doLogin()" id="login-btn">🔐 Sign In</button>
  <p style="text-align:center;margin-top:1.25rem;font-size:.8rem;color:var(--muted)"><a href="../index.html" style="color:var(--primary)">← Back to Hojozat</a></p>
</div>
<script src="js/admin.js"></script>
<script>
if (AdminAuth.isLoggedIn()) window.location.href = 'dashboard.html';
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await AdminAPI.post('/login', {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    });
    AdminAuth.save(res.token, res.user);
    window.location.href = 'dashboard.html';
  } catch(e) {
    err.textContent = e?.response?.data?.error || 'Login failed';
    err.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = '🔐 Sign In'; }
}
</script>
</body>
</html>
